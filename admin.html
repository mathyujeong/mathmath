<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 도구 - 유정쌤의 실험실</title>
    <link rel="icon" href="assets/favicon.png" type="image/png">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #fdfbf7; font-family: 'Noto Sans KR', sans-serif; }
        .admin-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }
        .switch {
            position: relative; display: inline-block; width: 60px; height: 34px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #ffd6e0; }
        input:checked + .slider:before { transform: translateX(26px); }
        input:checked + .slider { border: 2px solid #fbcfe8; }
        
        .login-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
    </style>
</head>
<body>
    <div id="login-screen" class="login-container">
        <div class="admin-glass p-10 rounded-[40px] w-full max-w-md text-center">
            <div class="text-4xl mb-4">🔑</div>
            <h1 class="font-bold text-2xl mb-6 text-gray-700">관리자 로그인</h1>
            <input type="email" id="admin-email" placeholder="이메일" 
                class="w-full p-4 rounded-2xl border-2 border-gray-100 bg-white shadow-inner mb-3 focus:outline-none focus:border-pink-300 text-center">
            <input type="password" id="admin-pass" placeholder="비밀번호" 
                class="w-full p-4 rounded-2xl border-2 border-gray-100 bg-white shadow-inner mb-4 focus:outline-none focus:border-pink-300 text-center">
            <button onclick="checkPass()" id="login-btn" class="w-full bg-[#ffd6e0] text-[#c026d3] font-bold py-4 rounded-2xl shadow-[0_5px_0_#fbcfe8] hover:translate-y-[2px] hover:shadow-[0_3px_0_#fbcfe8] transition-all">
                로그인
            </button>
            <p id="login-error" class="text-red-400 mt-4 text-sm hidden">이메일 또는 비밀번호가 올바르지 않습니다.</p>
            
            <!-- 진단 메시지 (문제가 있을 때만 표시됨) -->
            <div id="diag-msg" class="mt-6 p-3 bg-red-50 rounded-xl text-[11px] text-red-500 hidden text-left leading-relaxed">
                ⚠️ <b>환경변수 설정 오류 감지</b><br>
                서버에서 키(Key)가 정상적으로 주입되지 않았습니다. 
                Vercel 환경변수 설정 후 <b>Redeploy</b>를 하셨나요?
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden p-8 pt-20 max-w-4xl mx-auto">
        <nav class="flex items-center justify-between mb-8">
            <button onclick="location.href='index.html'" class="text-gray-400 hover:text-gray-700 font-bold flex items-center gap-2">
                <span>&larr;</span> 연구실로 돌아가기
            </button>
            <h1 class="text-3xl font-bold text-gray-800" style="font-family: 'Black Han Sans';">관리자 도구</h1>
            <button onclick="logout()" class="text-gray-400 hover:text-red-400 font-bold flex items-center gap-2 transition-colors">
                로그아웃 <span>→</span>
            </button>
        </nav>

        <!-- Tab Navigation -->
        <div class="flex gap-4 mb-10 border-b border-gray-100 pb-1">
            <button onclick="switchTab('programs')" id="tab-programs" class="text-lg font-bold pb-3 px-2 border-b-4 border-pink-300 text-gray-800 transition-all">프로그램 제어</button>
            <button onclick="switchTab('rankings')" id="tab-rankings" class="text-lg font-bold pb-3 px-2 border-b-4 border-transparent text-gray-400 hover:text-gray-600 transition-all">랭킹 기록 관리</button>
        </div>

        <div id="section-programs">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="program-list">
                <!-- Program items loaded here -->
            </div>

            <div class="mt-12 text-center text-gray-400 text-sm">
                <p>프로그램을 끄면 학생들의 화면에서 즉시 잠김 화면이 표시됩니다. 🌱</p>
            </div>
        </div>

        <div id="section-rankings" class="hidden">
            <div class="flex flex-wrap gap-3 mb-8">
                <button onclick="loadRankings('zombie_escape_rank')" class="px-5 py-2.5 rounded-xl bg-white border border-pink-200 text-gray-700 font-bold hover:bg-pink-50 transition-all text-sm">🐺 늑구의 모험</button>
                <button onclick="loadRankings('primenumber')" class="px-5 py-2.5 rounded-xl bg-white border border-cyan-200 text-gray-700 font-bold hover:bg-cyan-50 transition-all text-sm">🛡️ 소인수분해</button>
                <button onclick="loadRankings('scores')" class="px-5 py-2.5 rounded-xl bg-white border border-indigo-200 text-gray-700 font-bold hover:bg-indigo-50 transition-all text-sm">🎲 수학 다이스</button>
                <button onclick="loadRankings('transformer_rank')" class="px-5 py-2.5 rounded-xl bg-white border border-orange-200 text-gray-700 font-bold hover:bg-orange-50 transition-all text-sm">⚙️ 변환 기계</button>
                <button onclick="loadRankings('omok_rank')" class="px-5 py-2.5 rounded-xl bg-white border border-teal-200 text-gray-700 font-bold hover:bg-teal-50 transition-all text-sm">🎯 좌표 오목</button>
            </div>

            <div class="admin-glass rounded-[30px] overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50/50 text-gray-500 text-sm uppercase">
                        <tr>
                            <th class="p-5 font-bold">이름</th>
                            <th class="p-5 font-bold">점수</th>
                            <th class="p-5 font-bold">모드/난이도</th>
                            <th class="p-5 font-bold">날짜</th>
                            <th class="p-5 font-bold text-center">관리</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-table-body" class="divide-y divide-gray-100">
                        <tr>
                            <td colspan="5" class="p-10 text-center text-gray-400">게임을 선택하여 기록을 불러오세요.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 변수를 미리 선언 (초기화 에러 방지)
        let sb = null;
        let sbGame = null;

        const env = window._ENV_;
        const envLoadedAt = window._ENV_LOADED_AT;

        // 상세 진단 메시지 구성
        function showDiagMessage(msg) {
            const diagEl = document.getElementById('diag-msg');
            diagEl.innerHTML = `⚠️ <b>시스템 진단 결과:</b><br>${msg}`;
            diagEl.classList.remove('hidden');
        }

        if (!env) {
            if (window.location.protocol === 'file:') {
                showDiagMessage('<b>로컬 파일 실행 감지!</b><br>안내: 환경변수는 Vercel(서버) 배포 시에만 자동으로 주입됩니다. 컴퓨터(Finder)에서 직접 파일을 더블클릭하여 여신 경우 로그인이 불가능합니다. Vercel 배포 주소(https://...)로 접속해 주세요.');
            } else {
                showDiagMessage('<b>환경변수 주입 오류 (Vercel)</b><br>서버에는 파일이 배포되었으나 이전 버전을 기억하는 브라우저 캐시 문제일 수 있습니다. <b>키보드에서 Command(⌘) + Shift + R</b> 을 눌러 강력 새로고침을 해주세요.');
            }
        } else {
            const SUPABASE_URL = env.SUPABASE_URL_MAIN;
            const SUPABASE_KEY = env.SUPABASE_KEY_MAIN;
            const GAME_URL = env.SUPABASE_URL_GAME;
            const GAME_KEY = env.SUPABASE_KEY_GAME;

            const missing = [];
            if (!SUPABASE_URL) missing.push('URL_MAIN');
            if (!SUPABASE_KEY) missing.push('KEY_MAIN');
            if (!GAME_URL) missing.push('URL_GAME');
            if (!GAME_KEY) missing.push('KEY_GAME');

            if (missing.length > 0) {
                showDiagMessage(`<b>일부 환경변수 누락:</b> [${missing.join(', ')}]<br>Vercel 설정 페이지에서 해당 이름들이 정확한지 확인해 주세요.`);
            } else {
                try {
                    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    sbGame = supabase.createClient(GAME_URL, GAME_KEY);
                    console.log('Supabase clients initialized at', envLoadedAt);
                } catch (e) {
                    showDiagMessage(`초기화 코드 오류: ${e.message}`);
                }
            }
        }

        // 페이지 로드 시 이미 로그인 상태면 바로 대시보드 표시
        if (sb && sb.auth) {
            sb.auth.getSession().then(({ data: { session } }) => {
                if (session) showDashboard();
            });
        }

        // 엔터키로도 로그인 가능
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') checkPass();
        });

        async function checkPass() {
            const email = document.getElementById('admin-email').value.trim();
            const password = document.getElementById('admin-pass').value;
            const btn = document.getElementById('login-btn');
            const err = document.getElementById('login-error');

            if (!email || !password) {
                alert('이메일과 비밀번호를 모두 입력해 주세요.');
                return;
            }

            btn.textContent = '확인 중...';
            btn.disabled = true;
            err.classList.add('hidden');

            try {
                // Supabase 클라이언트가 정상적으로 초기화되었는지 확인
                if (!sb || !sb.auth) {
                    throw new Error('Supabase 클라이언트 초기화 실패. 환경변수를 확인하세요.');
                }

                const { error } = await sb.auth.signInWithPassword({ email, password });

                if (error) {
                    err.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
                    err.classList.remove('hidden');
                    btn.textContent = '로그인';
                    btn.disabled = false;
                } else {
                    showDashboard();
                }
            } catch (e) {
                console.error('Login error:', e);
                err.textContent = '로그인 중 기술적인 오류가 발생했습니다: ' + e.message;
                err.classList.remove('hidden');
                btn.textContent = '로그인';
                btn.disabled = false;
            }
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-dashboard').classList.remove('hidden');
            loadPrograms();
        }

        async function logout() {
            await sb.auth.signOut();
            location.reload();
        }

        function switchTab(tab) {
            const sections = ['programs', 'rankings'];
            sections.forEach(s => {
                document.getElementById(`section-${s}`).classList.toggle('hidden', s !== tab);
                const btn = document.getElementById(`tab-${s}`);
                if (s === tab) {
                    btn.classList.add('border-pink-300', 'text-gray-800');
                    btn.classList.remove('border-transparent', 'text-gray-400');
                } else {
                    btn.classList.remove('border-pink-300', 'text-gray-800');
                    btn.classList.add('border-transparent', 'text-gray-400');
                }
            });
        }

        // --- 랭킹 관리 로직 ---
        let currentTable = '';

        async function loadRankings(tableName) {
            currentTable = tableName;
            const tbody = document.getElementById('ranking-table-body');
            tbody.innerHTML = '<tr><td colspan="5" class="p-10 text-center animate-pulse">불러오는 중...</td></tr>';

            let query = sbGame.from(tableName).select('*');
            
            // 테이블별 최적 정렬 기준 설정
            if (tableName === 'primenumber') {
                query = query.order('score', { ascending: false }); // 소인수분해는 점수순 정렬
            } else if (tableName === 'scores') {
                query = query.order('score', { ascending: false }); // 수학 다이스
            } else {
                // 기본값: 생성일순 (없을 경우 id순)
                query = query.order('id', { ascending: false }); 
            }

            const { data, error } = await query;

            if (error) {
                console.error('Error:', error);
                const errorDetail = error.message || '알 수 없는 오류';
                tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500 bg-red-50/50 rounded-xl">
                    <b>데이터 로드 실패</b><br>
                    <span class="text-xs opacity-70">테이블: ${tableName}</span><br>
                    <span class="text-sm mt-2 block font-mono bg-white p-2 border border-red-100 rounded inline-block">Error: ${errorDetail}</span>
                </td></tr>`;
                return;
            }

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-gray-400">기록이 없습니다.</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(r => `
                <tr class="hover:bg-gray-50/50 transition-colors">
                    <td class="p-5 font-medium text-gray-700">${r.name || '익명'}</td>
                    <td class="p-5 font-bold text-pink-500">${r.score.toLocaleString()}</td>
                    <td class="p-5 text-gray-500 text-sm">${r.mode || r.level || '-'}</td>
                    <td class="p-5 text-gray-400 text-xs">${new Date(r.created_at).toLocaleString()}</td>
                    <td class="p-5 text-center">
                        <button onclick="deleteRankRecord('${tableName}', ${r.id})" class="text-red-300 hover:text-red-500 p-2 transition-colors" title="삭제">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function deleteRankRecord(tableName, id) {
            const secret = prompt('⚠️ 이 작업은 되돌릴 수 없습니다.\n본인 확인을 위해 삭제 비밀번호를 입력해 주세요:');
            if (secret === null) return; // 취소
            if (!secret) { alert('비밀번호를 입력해야 합니다.'); return; }

            const { data, error } = await sbGame.rpc('delete_ranking_record', {
                p_table: tableName,
                p_id: id,
                p_secret: secret
            });

            if (error) {
                console.error('Delete error:', error);
                alert('삭제 실패: ' + (error.message || '비밀번호가 틀렸거나 권한이 없습니다.'));
            } else {
                alert('기록이 성공적으로 삭제되었습니다.');
                loadRankings(tableName);
            }
        }

        // 메인 페이지와 동일한 순서 유지
        const PROGRAM_ORDER = ['sieve', 'game', 'zombie_escape', 'math_dice', 'transformer', 'omok'];

        async function loadPrograms() {
            const { data, error } = await sb
                .from('program_config')
                .select('*');
            
            if (error) {
                console.error('Error fetching programs:', error);
                alert('Supabase 테이블 "program_config"가 필요합니다.');
                return;
            }

            // 메인 페이지 순서에 맞게 정렬 (목록에 없는 항목은 뒤로)
            data.sort((a, b) => {
                const ai = PROGRAM_ORDER.indexOf(a.id);
                const bi = PROGRAM_ORDER.indexOf(b.id);
                return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
            });

            renderDashboard(data);

            // Subscribe to real-time changes manually (to keep UI in sync if opened in multiple tabs)
            sb.channel('public:program_config').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'program_config' }, (payload) => {
                const row = document.querySelector(`[data-id="${payload.new.id}"]`);
                if (row) {
                    const checkbox = row.querySelector('input');
                    checkbox.checked = payload.new.is_active;
                }
            }).subscribe();
        }

        function renderDashboard(programs) {
            const list = document.getElementById('program-list');
            list.innerHTML = '';

            programs.forEach(p => {
                const card = document.createElement('div');
                card.className = 'admin-glass p-8 rounded-[30px] flex items-center justify-between transition-all hover:scale-[1.02]';
                card.dataset.id = p.id;
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-3xl">${getIcon(p.id)}</span>
                        <div>
                            <h3 class="font-bold text-gray-700 text-lg">${p.display_name}</h3>
                            <p class="text-sm text-gray-400">${p.id}.html</p>
                        </div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" ${p.is_active ? 'checked' : ''} onchange="toggleProgram('${p.id}', this.checked)">
                        <span class="slider"></span>
                    </label>
                `;
                list.appendChild(card);
            });
        }

        async function toggleProgram(id, is_active) {
            const { error } = await sb
                .from('program_config')
                .update({ is_active })
                .eq('id', id);

            if (error) {
                console.error('Update failed:', error);
                alert('변경 사항 저장에 실패했습니다.');
            }
        }

        function getIcon(id) {
            const icons = {
                'sieve': '🌿',
                'game': '🛡️',
                'math_dice': '🎲',
                'omok': '🎯',
                'transformer': '⚙️',
                'zombie_escape': '🐺'
            };
            return icons[id] || '⭐';
        }
    </script>
</body>
</html>
